{% load i18n %} {% load static %}

<!-- CSS -->
{% block css %}
<style>
    .cards-section {
        background-color: var(--light-gray);
        position: relative;
    }

    .service-card {
        background: var(--primary-white);
        border-radius: 16px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        overflow: hidden;
        position: relative;
        border: 1px solid rgba(0, 0, 0, 0.05);
    }

    .service-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 20px 48px rgba(0, 0, 0, 0.15);
    }

    .card-image-wrapper {
        position: relative;
        height: 200px;
        overflow: hidden;
    }

    .card-image-wrapper img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.3s ease;
    }

    .service-card:hover .card-image-wrapper img {
        transform: scale(1.05);
    }

    .image-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, rgba(255, 20, 43, 0.1) 0%, rgba(0, 0, 0, 0.1) 100%);
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    .service-card:hover .image-overlay {
        opacity: 1;
    }

    .card-content {
        padding: 2rem;
        display: flex;
        flex-direction: column;
        height: calc(100% - 200px);
        min-height: 280px;
    }

    .card-header-section {
        margin-bottom: 1.5rem;
    }

    .card-title {
        color: var(--primary-black);
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        line-height: 1.3;
    }

    .title-accent {
        width: 40px;
        height: 3px;
        background: linear-gradient(90deg, var(--accent-color), #ff4757);
        border-radius: 2px;
    }

    .card-body-section {
        flex: 1;
        display: flex;
        flex-direction: column;
    }

    .content-wrapper {
        position: relative;
        flex: 1;
    }

    .card-text {
        color: var(--medium-gray);
        line-height: 1.7;
        font-size: 0.95rem;
        text-align: justify;
        margin-bottom: 1.5rem;
        display: -webkit-box;
        -webkit-line-clamp: 4;
        -webkit-box-orient: vertical;
        overflow: hidden;
        text-overflow: ellipsis;
        max-height: 6.8em;
        transition: max-height 0.3s ease;
    }

    .card-text.expanded {
        -webkit-line-clamp: unset;
        max-height: none;
        overflow: visible;
    }

    @media (max-width: 768px) {
        .card-content {
            padding: 1.5rem;
            min-height: 250px;
        }

        .card-image-wrapper {
            height: 180px;
        }

        .card-title {
            font-size: 1.3rem;
        }

        .card-text {
            font-size: 0.9rem;
        }
    }

    @media (max-width: 576px) {
        .cards-section {
            padding: 3rem 0;
        }

        .card-content {
            padding: 1.25rem;
        }

        .card-image-wrapper {
            height: 160px;
        }
    }

    .appear-animation {
        opacity: 0;
        transform: translateY(30px);
        animation: fadeInUpShorter 0.8s ease forwards;
    }

    @keyframes fadeInUpShorter {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .appear-animation:nth-child(1) {
        animation-delay: 0.1s;
    }

    .appear-animation:nth-child(2) {
        animation-delay: 0.2s;
    }

    .appear-animation:nth-child(3) {
        animation-delay: 0.3s;
    }

    .appear-animation:nth-child(4) {
        animation-delay: 0.4s;
    }

    .appear-animation:nth-child(5) {
        animation-delay: 0.5s;
    }

    .appear-animation:nth-child(6) {
        animation-delay: 0.6s;
    }
</style>
{% endblock %}

<!-- Improved Cards -->
<div class="cards-section py-5">
    <div id="examples" class="container">
        <div class="row g-4">
            {% for service in services %}
            <div class="col-lg-4 col-md-6 appear-animation" data-appear-animation="fadeInUpShorter"
                data-appear-animation-delay="300">
                <div class="service-card h-100">
                    {% if service.image_url %}
                    <div class="card-image-wrapper">
                        <img src="{{ service.image_url }}" class="card-img-top" alt="{{ service.title }}">
                        <div class="image-overlay"></div>
                    </div>
                    {% endif %}

                    <div class="card-content">
                        <div class="card-header-section">
                            <h3 class="card-title">{{ service.title }}</h3>
                            <div class="title-accent"></div>
                        </div>

                        <div class="card-body-section">
                            <div class="content-wrapper">
                                <p class="card-text" id="card-text-{{ forloop.counter }}">{{ service.content }}</p>

                                <div class="readmore-controls" id="readmore-{{ forloop.counter }}"
                                    style="display: none;">
                                    <a href="javascript:void(0)" class="read-more-btn"
                                        onclick="toggleReadMore('{{ forloop.counter }}')">
                                        <span class="read-more-text">{% trans "Read More" %}</span>
                                        <i class="fas fa-chevron-down ms-1 read-more-icon"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card-footer-accent"></div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>


{% block js %}
<script>
    document.addEventListener('DOMContentLoaded', function () {
        // Check each card text for overflow
        document.querySelectorAll('.card-text').forEach(function (textElement, index) {
            const cardId = index + 1;
            const readMoreControl = document.getElementById('readmore-' + cardId);

            // Check if text is overflowing
            if (textElement.scrollHeight > textElement.clientHeight) {
                readMoreControl.style.display = 'block';
            }
        });
    });

    function toggleReadMore(cardId) {
        const textElement = document.getElementById('card-text-' + cardId);
        const readMoreBtn = document.querySelector('#readmore-' + cardId + ' .read-more-btn');
        const readMoreText = readMoreBtn.querySelector('.read-more-text');
        const readMoreIcon = readMoreBtn.querySelector('.read-more-icon');

        if (textElement.classList.contains('expanded')) {
            // Collapse text
            textElement.classList.remove('expanded');
            readMoreText.textContent = '{% trans "Read More" %}';
            readMoreIcon.className = 'fas fa-chevron-down ms-1 read-more-icon';
        } else {
            // Expand text
            textElement.classList.add('expanded');
            readMoreText.textContent = '{% trans "Read Less" %}';
            readMoreIcon.className = 'fas fa-chevron-up ms-1 read-more-icon';
        }

        return false;
    }
</script>
{% endblock %}
