{% load i18n %} {% load static %} {% block css %}
<style>
  .about-section {
    padding: 105px 0;
    background:
      radial-gradient(circle at left top, rgba(85, 122, 189, 0.12), transparent 26%),
      linear-gradient(180deg, #ffffff 0%, #f8faff 100%);
  }

  .about-entry + .about-entry {
    margin-top: 4.5rem;
  }

  .about-showcase {
    align-items: center;
  }

  .about-image-panel {
    position: relative;
    padding: 1.1rem;
    border-radius: 34px;
    background: linear-gradient(145deg, rgba(255, 255, 255, 0.92), rgba(226, 234, 252, 0.92));
    box-shadow: 0 28px 70px rgba(23, 36, 69, 0.12);
  }

  .about-image-panel::before {
    content: "";
    position: absolute;
    left: -22px;
    bottom: 34px;
    width: 90px;
    height: 90px;
    border-radius: 28px;
    background: linear-gradient(135deg, rgba(79, 113, 187, 0.22), rgba(79, 113, 187, 0.04));
    z-index: 0;
  }

  .about-image-panel::after {
    content: "";
    position: absolute;
    right: -18px;
    top: 26px;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(85, 122, 189, 0.24), rgba(85, 122, 189, 0));
    z-index: 0;
  }

  .about-image-frame {
    position: relative;
    z-index: 1;
    overflow: hidden;
    border-radius: 28px;
  }

  .about-image-frame img {
    width: 100%;
    min-height: 540px;
    max-height: 540px;
    object-fit: cover;
    display: block;
    transform: scale(1.01);
  }

  .about-content-card {
    position: relative;
    padding: 2.75rem 2.9rem;
    border-radius: 34px;
    background: rgba(255, 255, 255, 0.9);
    border: 1px solid rgba(85, 122, 189, 0.12);
    box-shadow: 0 24px 60px rgba(23, 36, 69, 0.1);
    overflow: hidden;
  }

  .about-content-card::before {
    content: "";
    position: absolute;
    inset: 0 auto auto 0;
    width: 100%;
    height: 5px;
    background: linear-gradient(90deg, #4f71bb 0%, #8ea7df 100%);
  }

  .about-kicker {
    display: inline-flex;
    align-items: center;
    gap: 0.7rem;
    padding: 0.85rem 1.25rem;
    border-radius: 999px;
    background: rgba(85, 122, 189, 0.12);
    color: var(--accent-color-deep);
    font-size: 0.88rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .about-kicker::before {
    content: "";
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4f71bb, #90a9df);
  }

  .about-content h2 {
    margin: 1.4rem 0 1.2rem;
    font-family: "Playfair Display", serif;
    font-size: clamp(2.4rem, 4vw, 4rem);
    font-weight: 700;
    color: #192544;
    line-height: 1.05;
  }

  .about-copy {
    position: relative;
    padding-left: 1.4rem;
    margin-bottom: 0;
  }

  .about-copy::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0.25rem;
    bottom: 0.25rem;
    width: 3px;
    border-radius: 999px;
    background: linear-gradient(180deg, rgba(79, 113, 187, 0.9), rgba(79, 113, 187, 0.16));
  }

  .about-copy p {
    color: #5d6783;
    font-size: 1.06rem;
    line-height: 1.95;
    margin-bottom: 0;
  }

  .about-actions {
    margin-top: 1.9rem;
    padding-top: 1.5rem;
    border-top: 1px solid rgba(85, 122, 189, 0.14);
  }

  .about-content .btn {
    padding: 0.95rem 1.7rem;
    border-radius: 999px;
    box-shadow: 0 18px 36px rgba(79, 113, 187, 0.2);
  }

  @media (max-width: 991.98px) {
    .about-section {
      padding: 90px 0;
    }

    .about-entry + .about-entry {
      margin-top: 3.25rem;
    }

    .about-content-card {
      padding: 2.25rem;
    }

    .about-image-frame img {
      min-height: 460px;
      max-height: 460px;
    }
  }

  @media (max-width: 767.98px) {
    .about-content-card {
      padding: 1.85rem 1.5rem;
      border-radius: 26px;
    }

    .about-image-panel {
      border-radius: 26px;
      padding: 0.85rem;
    }

    .about-image-frame {
      border-radius: 22px;
    }

    .about-image-frame img {
      min-height: 360px;
      max-height: 360px;
    }
  }
</style>
{% endblock %}

{% if leadership_messages %}
<section class="about-section">
  <div class="container">
    {% for message in leadership_messages %}
    <div class="about-entry">
      <div class="row g-5 about-showcase">
        <div class="col-lg-6 {% if forloop.counter|divisibleby:2 %}order-lg-2{% endif %}">
          <div class="about-image-panel">
            <div class="about-image-frame">
              <img src="{{ message.image.url }}" alt="{{ message.title }}" class="img-fluid" />
            </div>
          </div>
        </div>

        <div class="col-lg-6 {% if forloop.counter|divisibleby:2 %}order-lg-1{% endif %}">
          <div class="about-content about-content-card">
            <!-- <span class="about-kicker">{% trans "Leadership Message" %}</span> -->
            <h2>{{ message.title }}</h2>

            <div class="about-copy">
              <p>{{ message.content|linebreaksbr }}</p>
            </div>

            <div class="about-actions">
              <a href="{% url 'about' %}" class="btn btn-corporate-red">
                {% trans "Learn More About Us" %}
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</section>
{% endif %}
