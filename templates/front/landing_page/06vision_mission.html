{% load i18n %} {% load static %} {% block css %}
<style>
  .vision-title {
    color: var(--accent-color)
  }


  .vision-section {
    padding: 100px 0;
    background-color: var(--light-gray);
  }

  .vision-content h2 {
    font-family: "Playfair Display", serif;
    font-size: 2.5rem;
    font-weight: 600;
    color: var(--primary-black);
    margin-bottom: 25px;
    line-height: 1.3;
  }

  .vision-content p {
    color: var(--medium-gray);
    font-size: 1.1rem;
    line-height: 1.8;
    margin-bottom: 20px;
  }

  @media (max-width: 768px) {
    .vision-content h2 {
      font-size: 2rem;
    }
  }
</style>

{% endblock %} {% if vision_mission %}
<section class="vision-section bg-corporate-light">
  <div class="container">
    <div class="row mb-5">
      <div class="col-12 text-center">
        <h2 class="section-title display-4">Vision & Mission</h2>
        <p class="lead text-muted">
          Building the future through innovative engineering
          solutions
        </p>
      </div>
    </div>
    <div class="row g-5">
      {% for vision in vision_mission %}
      <div class="col-lg-6">
        <div class="vision-content">
          <h3 class="value-title mb-4">{{ vision.title }}</h3>
          <p class="service-description">{{ vision.content }}</p>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
{% endif %}
