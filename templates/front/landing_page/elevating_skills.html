{% load i18n %} {% load static %}

<!--  CSS    -->
{% block css %}
<style>
  .vision-card {
    background: rgba(255, 255, 255, 0.1);
    border: none;
    border-radius: 0;
    padding: 40px 30px;
    text-align: center;
    transition: all 0.3s ease;
    height: 100%;
  }

  /* Added Elevating Skills section styling */
  .skills-section {
    padding: 100px 0;
    background-color: var(--primary-white);
  }

  .video-wrapper {
    position: relative;
    padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
    height: 0;
    overflow: hidden;
  }

  .video-wrapper iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }
</style>
{% endblock %}

<!--   Elevating Skills  -->
{% if elevating_skills %} {% for skills in elevating_skills %}
<section class="skills-section">
  <div class="container">
    <div class="row justify-content-center mb-5">
      <div class="col-lg-8 text-center">
        <h2 class="section-title display-4 text-corporate-red">
          {{ skills.title }}
        </h2>
        <p class="lead text-muted">{{ skills.content }}</p>
      </div>
    </div>
    <div class="row justify-content-center">
      <div class="col-lg-10">
        <div class="video-wrapper">
          <div class="ratio ratio-16x9">{{ skills.link|safe }}</div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endfor %} {% endif %}
