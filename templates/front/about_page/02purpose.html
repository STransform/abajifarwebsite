{% load i18n %} {% load static %} {% block css %}
<style>
  .about-title {
    font-size: 3.5rem;
    font-weight: 700;
    color: var(--primary-black);
    margin-bottom: 2rem;
    position: relative;
    text-align: center;
  }

  .about-title::after {
    content: "";
    position: absolute;
    bottom: -15px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 4px;
    background: var(--accent-color);
    border-radius: 2px;
  }

  .about-content {
    background-color: var(--primary-white);
    padding: 80px 0;
  }

  .about-text-section {
    padding-right: 2rem;
  }

  .about-text-highlight {
    font-size: 1.4rem;
    font-weight: 600;
    color: var(--primary-black);
    margin-bottom: 2rem;
    line-height: 1.6;
  }

  .image-gallery-container {
    position: relative;
    min-height: 500px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .image-gallery {
    position: relative;
    width: 100%;
  }

  .gallery-image {
    width: 100%;
    height: 400px;
    transition: all 0.4s ease;
  }

  .gallery-image-1 {
    width: 100%;
    height: 450px;
    object-fit: contain;
    z-index: 1;
  }

  @media (max-width: 768px) {
    .about-title {
      font-size: 2.5rem;
    }

    .about-text-section {
      padding-right: 0;
      margin-bottom: 3rem;
    }

    .image-gallery {
      height: 300px;
    }

    .gallery-image-1,
    .gallery-image-2,
    .gallery-image-3 {
      position: relative;
      width: 100%;
      height: auto;
      margin-bottom: 1rem;
    }
  }
</style>
{% endblock %}

<!-- About Our Purpose -->
<section class="about-content">
  <div class="container">
    <div class="row align-items-center">
      <div class="col-lg-6 about-text-section">
        <div class="about-text-highlight appear-animation" data-appear-animation="fadeInLeft"
          data-appear-animation-delay="400">
          {{about_data.title}}
        </div>
        <p class="otech-font appear-animation" data-appear-animation="fadeInLeft" data-appear-animation-delay="500">
          {{ about_data.content }}
        </p>
      </div>

      <div class="col-lg-6">
        <div class="image-gallery-container">
          <div class="image-gallery">
            {% if about_data.image_one %}
            <img src="{{ about_data.image_one.url }}" class="gallery-image gallery-image-1 appear-animation"
              data-appear-animation="fadeInRight" data-appear-animation-delay="600" alt="About Image" />
            {% endif %}
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
