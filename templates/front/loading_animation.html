{% load static %}

<!-- Loading Animation Overlay -->
<div id="loading-overlay" class="loading-overlay">
    <div class="loading-container">
        <!-- Main Loading Spinner with Logo Inside -->
        <div class="loading-spinner">
            <div class="spinner-ring"></div>
            <div class="spinner-ring"></div>
            <div class="spinner-ring"></div>

            <!-- Logo inside the spinner rings -->
            <div class="spinner-center">
                {% if stg.logo %}
                <a href="{% url 'index' %}">
                    <img src="{{stg.logo.url}}" class="img-fluid" alt="Logo" style="width: 60px; height: 60px;" />
                </a>
                {% endif %}
            </div>
        </div>

        <div class="loading-text">
            <h3 class="loading-title">OTech Engineering</h3>
        </div>

        <!-- Progress Bar -->
        <div class="loading-progress">
            <div class="progress-bar"></div>
        </div>
    </div>
</div>

<style>
    .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #ffffff 0%, var(--primary-color) 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        opacity: 1;
        visibility: visible;
        transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    .loading-overlay.fade-out {
        opacity: 0;
        visibility: hidden;
    }

    .loading-container {
        text-align: center;
        max-width: 400px;
        padding: 40px;
    }

    .loading-spinner {
        position: relative;
        width: 120px;
        height: 120px;
        margin: 0 auto 30px;
    }

    .spinner-ring {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: 3px solid transparent;
        border-radius: 50%;
        animation: spin 2s linear infinite;
    }

    .spinner-ring:nth-child(1) {
        border-top-color: var(--accent-color);
        animation-delay: 0s;
    }

    .spinner-ring:nth-child(2) {
        border-right-color: var(--primary-black);
        animation-delay: -0.5s;
        width: 90%;
        height: 90%;
        top: 5%;
        left: 5%;
    }

    .spinner-ring:nth-child(3) {
        border-bottom-color: var(--accent-color);
        animation-delay: -1s;
        width: 80%;
        height: 80%;
        top: 10%;
        left: 10%;
    }

    /* Added styling for logo centered inside spinner rings */
    .spinner-center {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 10;
    }

    .spinner-center img {
        transition: transform 0.3s ease;
        background: rgba(255, 255, 255, 0.9);
        padding: 2px;
    }

    .spinner-center img:hover {
        transform: scale(1.05);
    }

    @keyframes spin {
        0% {
            transform: rotate(0deg);
        }

        100% {
            transform: rotate(360deg);
        }
    }

    .loading-subtitle {
        font-family: 'Inter', sans-serif;
        font-size: 16px;
        color: #6c757d;
        margin: 0 0 30px 0;
        font-weight: 400;
    }

    .loading-progress {
        width: 200px;
        height: 4px;
        background-color: var(--primary-color);
        border-radius: 2px;
        margin: 0 auto;
        overflow: hidden;
        position: relative;
    }

    .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, var(--accent-color), var(--primary-black), var(--accent-color));
        background-size: 200% 100%;
        border-radius: 2px;
        animation: progress 2s ease-in-out infinite;
    }

    @keyframes progress {
        0% {
            width: 0%;
            background-position: 0% 50%;
        }

        50% {
            width: 70%;
            background-position: 100% 50%;
        }

        100% {
            width: 100%;
            background-position: 0% 50%;
        }
    }

    /* Pulse animation for the container */
    .loading-container {
        animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {

        0%,
        100% {
            transform: scale(1);
        }

        50% {
            transform: scale(1.02);
        }
    }

    /* Mobile responsiveness */
    @media (max-width: 768px) {
        .loading-container {
            padding: 20px;
        }

        .loading-spinner {
            width: 80px;
            height: 80px;
        }

        .loading-subtitle {
            font-size: 14px;
        }

        .loading-progress {
            width: 150px;
        }

        /* Adjusted logo size for mobile inside spinner */
        .spinner-center img {
            width: 40px !important;
            height: 40px !important;
        }
    }
</style>

<script>
    // Loading animation control
    document.addEventListener('DOMContentLoaded', function () {
        const loadingOverlay = document.getElementById('loading-overlay');

        // Minimum loading time (in milliseconds)
        const minLoadingTime = 1000;
        const startTime = Date.now();

        // Function to hide loading animation
        function hideLoading() {
            const elapsedTime = Date.now() - startTime;
            const remainingTime = Math.max(0, minLoadingTime - elapsedTime);

            setTimeout(() => {
                loadingOverlay.classList.add('fade-out');

                // Remove the element after fade out completes
                setTimeout(() => {
                    if (loadingOverlay && loadingOverlay.parentNode) {
                        loadingOverlay.parentNode.removeChild(loadingOverlay);
                    }
                }, 500);
            }, remainingTime);
        }

        // Hide loading when everything is loaded
        if (document.readyState === 'complete') {
            hideLoading();
        } else {
            window.addEventListener('load', hideLoading);
        }

        // Fallback: hide loading after maximum time (10 seconds)
        setTimeout(hideLoading, 10000);
    });
</script>
