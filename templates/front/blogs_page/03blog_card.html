{% load i18n %} {% load static %}

<!-- CSS -->
{% block css %}
<style>
    .blog-image {
        position: relative;
        overflow: hidden;
    }

    .blog-image img {
        width: 100%;
        height: 400px;
        object-fit: cover;
        transition: transform 0.3s ease;
    }

    .blog-card:hover .blog-image img {
        transform: scale(1.05);
    }

    .blog-content {
        padding: 2rem;
    }

    .blog-title {
        font-size: 2rem;
        font-weight: 700;
        color: var(--primary-black);
        margin-bottom: 1.5rem;
        line-height: 1.3;
    }

    .author-section {
        display: flex;
        align-items: center;
        margin-bottom: 1.5rem;
        padding: 1rem;
        background: var(--light-gray);
        border-radius: 8px;
    }

    .author-avatar {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        margin-right: 1rem;
        border: 3px solid var(--accent-color);
    }

    .author-info h4 {
        margin: 0;
        color: var(--primary-black);
        font-weight: 600;
    }

    .blog-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 1.5rem;
        margin-bottom: 1.5rem;
        padding: 1rem;
        background: var(--light-gray);
        border-radius: 8px;
    }

    .meta-item {
        display: flex;
        align-items: center;
        color: var(--medium-gray);
        font-size: 0.9rem;
    }

    .meta-item i {
        margin-right: 0.5rem;
        color: var(--accent-color);
    }

    .meta-item a {
        color: var(--medium-gray);
        text-decoration: none;
        transition: color 0.3s ease;
    }

    .meta-item a:hover {
        color: var(--accent-color);
    }

    .social-share {
        margin: 1.5rem 0;
        padding: 1rem;
        background: var(--light-gray);
        border-radius: 8px;
    }

    .sidebar-widget {
        background: var(--primary-white);
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        padding: 1.5rem;
        margin-bottom: 2rem;
    }

    @media (max-width: 768px) {
        .blog-meta {
            flex-direction: column;
            gap: 0.5rem;
        }

        .author-section {
            flex-direction: column;
            text-align: center;
        }

        .author-avatar {
            margin-right: 0;
            margin-bottom: 1rem;
        }
    }
</style>
{% endblock %}

<div class="blog-card">
    <div class="blog-image">
        {% if blog.images %}
        <img src="{{blog.images.url}}" alt="{{blog.title}}" />
        {% else %}
        <img src="{% static 'front/imgs/blog/blog-1.jpg' %}" alt="{{blog.title}}" />
        {% endif %}
    </div>

    <div class="blog-content">
        <h1 class="blog-title">{{blog.title}}</h1>
        <div class="blog-meta">
            <div class="meta-item">
                <i class="far fa-clock"></i>
                <span>{{blog.created_date|date}}</span>
            </div>
            <div class="meta-item">
                <i class="far fa-user"></i>
                <span>{% trans "By" %}
                    <a href="javascript:void(0);"
                        title="Contact : {{blog.created_by.email}} {% if blog.created_by.phonenumber %} ,{{blog.created_by.phonenumber}} {% endif %}">
                        {{blog.created_by}}
                    </a>
                </span>
            </div>
            <div class="meta-item">
                <i class="far fa-folder"></i>
                <a href="javascript:void(0);">{{blog.category}}</a>
            </div>
            <div class="meta-item">
                <i class="far fa-comments"></i>
                <a href="javascript:void(0);">{{blog.comments.count}} {% trans "Comments" %}</a>
            </div>

            <div class="meta-item">
                <a href="javascript:void(0);" id="shareBtn">
                    <i class="fas fa-share"></i> Share</a>
            </div>
        </div>
    </div>
</div>



<script>
    document.getElementById("shareBtn").addEventListener("click", async () => {
        if (navigator.share) {
            try {
                await navigator.share({
                    title: "Check out this post: {{ blog.title|escapejs }}", // <-- Django variable, escaped for JS
                    text: `Check out this post: {{ blog.title|escapejs }}`,
                    url: window.location.href
                });
                console.log("Shared successfully!");
            } catch (err) {
                console.warn("Share was cancelled or failed:", err);
            }
        }
    });
</script>
