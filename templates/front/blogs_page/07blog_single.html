{% load i18n %} {% load static %}

{% block css %}
<style>
    .blog-card {
        background: var(--primary-white);
        border: none;
        border-radius: 16px;
        padding: 0;
        text-align: left;
        transition: all 0.4s ease;
        height: 100%;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        overflow: hidden;
        position: relative;
    }

    .blog-card:hover {
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
    }

    .blog-image-wrapper {
        position: relative;
        padding-bottom: 60%;
        height: 0;
        overflow: hidden;
        border-radius: 16px 16px 0 0;
    }

    .blog-image-wrapper img {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.4s ease;
    }

    .blog-card:hover .blog-image-wrapper img {
        transform: scale(1.1);
    }

    .blog-content {
        padding: 30px 25px;
        position: relative;
    }

    .blog-meta {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 15px;
        flex-wrap: wrap;
    }

    .blog-meta span {
        color: var(--medium-gray);
        font-weight: 600;
        font-size: 0.85rem;
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .blog-meta i {
        color: var(--accent-color);
    }

    .blog-title {
        font-family: "Playfair Display", serif;
        font-weight: 600;
        color: var(--primary-black);
        margin-bottom: 15px;
        line-height: 1.4;
        transition: color 0.3s ease;
    }

    .blog-card:hover .blog-title {
        color: var(--accent-color);
    }

    .blog-excerpt {
        color: var(--medium-gray);
        line-height: 1.6;
        margin-bottom: 20px;
        overflow: hidden;
        height: 90px;
    }
</style>
{% endblock %}


{% if blog %}
<div class="col-lg-4 col-md-6">
    <article class="blog-card h-100">
        <div class="blog-image-wrapper">
            <a href="{% url 'blog_detail' blog_id=blog.id %}">
                <img src="{{blog.images.url}}" alt="{{blog.title}}" class="img-fluid blog-image" />
            </a>
        </div>

        <div class="blog-content">
            <div class="blog-meta mb-3">
                <span><i class="far fa-calendar-alt"></i>{{blog.created_date}}</span>
                <span><i class="far fa-user"></i>{% trans "By" %} {{blog.created_by}}</span>
                <span><i class="far fa-comments"></i>{{blog.comments.count}}
                    {% trans "Comments" %}</span>
            </div>

            <h5 class="blog-title">
                <a href="{% url 'blog_detail' blog_id=blog.id %}" style="text-decoration: none; color: inherit;">
                    {{blog.title|truncatechars:50}}
                </a>
            </h5>

            <p class="blog-excerpt">{{blog.content|truncatechars:130}}</p>

            <a href="{% url 'blog_detail' blog_id=blog.id %}" class="btn-corporate-red">
                {% trans "Read More" %} <i class="fa fa-angle-right"></i>
            </a>
        </div>
    </article>
</div>

{% endif %}
